services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hyperion-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client:/app
      - /app/node_modules

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hyperion-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./server:/app
      - /app/node_modules
