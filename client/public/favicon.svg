<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-fav" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#bgGrad)"/>

  <!-- Outer orbit ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#00E5FF" stroke-width="2" opacity="1"/>
  <!-- Inner orbit ring -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#00E5FF" stroke-width="1.2" opacity="0.7"/>

  <!-- Hexagon outline -->
  <polygon points="32,9 52,20 52,44 32,55 12,44 12,20"
           fill="none" stroke="#00E5FF" stroke-width="1.4" opacity="0.5"/>

  <!-- Connector lines -->
  <line x1="32" y1="32" x2="57" y2="32" stroke="#00E5FF" stroke-width="1.4" opacity="0.8"/>
  <line x1="32" y1="32" x2="19" y2="54" stroke="#00E5FF" stroke-width="1.4" opacity="0.8"/>
  <line x1="32" y1="32" x2="19" y2="10" stroke="#00E5FF" stroke-width="1.4" opacity="0.8"/>

  <!-- Satellite nodes -->
  <circle cx="57" cy="32" r="4.5" fill="#00E5FF" opacity="1" filter="url(#glow-fav)"/>
  <circle cx="19" cy="54" r="4.5" fill="#00E5FF" opacity="1" filter="url(#glow-fav)"/>
  <circle cx="19" cy="10" r="4.5" fill="#00E5FF" opacity="1" filter="url(#glow-fav)"/>

  <!-- Bright center core -->
  <circle cx="32" cy="32" r="9" fill="#00E5FF" opacity="1" filter="url(#glow-fav)"/>
  <!-- White hot center -->
  <circle cx="32" cy="32" r="4" fill="#ffffff" opacity="0.95"/>
</svg>
